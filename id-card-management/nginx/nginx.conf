events {
    worker_connections 1024;
}

http {
    # Upstream for Spring Boot application (running locally on port 8081)
    upstream springboot {
        server 127.0.0.1:8081;
    }

    # Main server configuration listening on port 8080
    # Externally exposed via Kubernetes Service as port 8443
    server {
        listen 8080;
        server_name localhost;

        # Proxy all requests to Spring Boot
        location / {
            proxy_pass http://springboot;
            proxy_set_header Host $host;
            proxy_set_header X-Real-IP $remote_addr;
            proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
            proxy_set_header X-Forwarded-Proto $scheme;
            
            proxy_connect_timeout 60s;
            proxy_send_timeout 60s;
            proxy_read_timeout 60s;
        }

        # Static resources
        location /static/ {
            alias /app/static/;
        }
    }
}