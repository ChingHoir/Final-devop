apiVersion: v1
kind: Pod
metadata:
  name: e20221469-pod
  labels:
    app: e20221469-id-card
spec:
  containers:
  # Container 1: Web Server (JDK 21 + NGINX + Spring Boot + PHP + SSH)
  - name: web-server
    image: id-card-app:latest
    imagePullPolicy: Never
    ports:
    - containerPort: 8080
      name: nginx
    - containerPort: 8081
      name: springboot
    - containerPort: 22
      name: ssh
    env:
    - name: SERVER_PORT
      value: "8081"
    - name: SPRING_DATASOURCE_URL
      value: "jdbc:mysql://127.0.0.1:3306/B-Huy_Chanchhinghoir-db?useSSL=false&serverTimezone=UTC&allowPublicKeyRetrieval=true"
    - name: SPRING_DATASOURCE_USERNAME
      value: "root"
    - name: SPRING_DATASOURCE_PASSWORD
      value: "Hello@123"
    - name: SPRING_JPA_HIBERNATE_DDL_AUTO
      value: "update"
    - name: SPRING_JPA_SHOW_SQL
      value: "true"

  # Container 2: MySQL Database
  - name: mysql
    image: mysql:8.0
    ports:
    - containerPort: 3306
    env:
    - name: MYSQL_ROOT_PASSWORD
      value: "Hello@123"
    - name: MYSQL_DATABASE
      value: "B-Huy_Chanchhinghoir-db"
    - name: MYSQL_CHARACTER_SET_SERVER
      value: "utf8mb4"
    - name: MYSQL_COLLATION_SERVER
      value: "utf8mb4_unicode_ci"
---
apiVersion: v1
kind: Service
metadata:
  name: e20221469-service
spec:
  selector:
    app: e20221469-id-card
  ports:
  - name: website
    port: 8443
    targetPort: 8080
    nodePort: 30843
  - name: app-direct
    port: 8081
    targetPort: 8081
    nodePort: 30881
  - name: ssh
    port: 2222
    targetPort: 22
    nodePort: 30222
  - name: mysql
    port: 3306
    targetPort: 3306
    nodePort: 30306
  type: NodePort
