<!DOCTYPE html>
<html xmlns:th="http://www.thymeleaf.org">
<head>
    <title>Profile Form - ID Card Management</title>
    <link rel="stylesheet" th:href="@{/css/style.css}">
</head>
<body>
    <div class="container">
        <h1 th:text="${profile.id} ? 'Edit Profile' : 'Create Profile'"></h1>

        <div th:if="${error}" class="alert alert-error">
            <span th:text="${error}"></span>
        </div>

        <form th:action="@{${profile.id} ? '/api/profiles/update/' + ${profile.id} : '/api/profiles/create'}" th:object="${profile}" method="post" enctype="multipart/form-data">
            <div style="display:grid;grid-template-columns:1fr 1fr;gap:20px;">
                <div class="form-group">
                    <label>Full Name *</label>
                    <input type="text" th:field="*{fullName}" placeholder="John Doe" required>
                    <span th:if="${#fields.hasErrors('fullName')}" th:errors="*{fullName}" class="error"></span>
                </div>

                <div class="form-group">
                    <label>Email *</label>
                    <input type="email" th:field="*{email}" placeholder="john@example.com" required>
                    <span th:if="${#fields.hasErrors('email')}" th:errors="*{email}" class="error"></span>
                </div>

                <div class="form-group">
                    <label>Phone *</label>
                    <input type="text" th:field="*{phone}" placeholder="+1234567890" required>
                    <span th:if="${#fields.hasErrors('phone')}" th:errors="*{phone}" class="error"></span>
                </div>

                <div class="form-group">
                    <label>Profile Type *</label>
                    <select th:field="*{profileType}" required>
                        <option value="">-- Select Type --</option>
                        <option th:each="type : ${profileTypes}" th:value="${type}" th:text="${type}"></option>
                    </select>
                </div>

                <div class="form-group">
                    <label>Department</label>
                    <input type="text" th:field="*{department}" placeholder="Engineering">
                </div>

                <div class="form-group">
                    <label>Position</label>
                    <input type="text" th:field="*{position}" placeholder="Software Developer">
                </div>
            </div>

            <div class="form-group">
                <label>Address</label>
                <textarea th:field="*{address}" placeholder="123 Main Street, City"></textarea>
            </div>

            <div class="form-group">
                <label>Photo (JPEG/PNG, max 5MB)</label>
                <input type="file" name="photoFile" accept="image/jpeg,image/png">
            </div>

            <div class="form-actions">
                <button type="submit" th:text="${profile.id} ? 'Update Profile' : 'Save Profile'"></button>
                <a th:href="@{/api/profiles}" class="btn btn-cancel">Cancel</a>
            </div>
        </form>
    </div>
</body>
</html>
