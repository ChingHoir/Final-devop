<!DOCTYPE html>
<html xmlns:th="http://www.thymeleaf.org">
<head>
    <title>ID Card Preview - ID Card Management</title>
    <link rel="stylesheet" th:href="@{/css/style.css}">
</head>
<body>
    <div class="container">
        <h1>ID Card Preview</h1>

        <div class="id-card" th:with="profile=${profile}">
            <div class="card-header">
                <h2>INSTITUTION ID CARD</h2>
                <p th:text="'Reg #: ' + ${profile.registrationNumber}"></p>
            </div>

            <div class="card-body">
                <div class="photo-section">
                    <img th:if="${profile.photo != null}"
                         th:src="'data:' + ${profile.photoContentType} + ';base64,' + ${profile.photoBase64}"
                         alt="Photo">
                    <div th:unless="${profile.photo != null}" class="no-photo">No Photo</div>
                </div>

                <div class="info-section">
                    <div class="info-item">
                        <span class="info-label">Name</span>
                        <span class="info-value" th:text="${profile.fullName}"></span>
                    </div>
                    <div class="info-item">
                        <span class="info-label">Email</span>
                        <span class="info-value" th:text="${profile.email}"></span>
                    </div>
                    <div class="info-item">
                        <span class="info-label">Phone</span>
                        <span class="info-value" th:text="${profile.phone}"></span>
                    </div>
                    <div class="info-item">
                        <span class="info-label">Type</span>
                        <span class="info-value" th:text="${profile.profileType}"></span>
                    </div>
                    <div class="info-item">
                        <span class="info-label">Department</span>
                        <span class="info-value" th:text="${profile.department}"></span>
                    </div>
                    <div class="info-item">
                        <span class="info-label">Position</span>
                        <span class="info-value" th:text="${profile.position}"></span>
                    </div>
                </div>
            </div>

            <div class="card-footer">
                <div class="qr-section">
                    <img th:src="@{/api/profiles/{id}/qrcode(id=${profile.id})}" alt="QR Code">
                </div>
                <div style="display:flex;gap:8px;">
                    <a th:href="@{/api/profiles/{id}/pdf(id=${profile.id})}" class="btn btn-pdf" style="padding:8px 16px;font-size:13px;">Download PDF</a>
                    <a th:href="@{/api/profiles}" class="btn btn-back" style="padding:8px 16px;font-size:13px;">Back to List</a>
                </div>
            </div>
        </div>
    </div>
</body>
</html>
