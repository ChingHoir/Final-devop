<!DOCTYPE html>
<html xmlns:th="http://www.thymeleaf.org">
<head>
    <title>ID Card Profile Form</title>
    <link rel="stylesheet" th:href="@{/css/style.css}">
</head>
<body>
    <div class="container">
        <h1>ID Card Profile Management</h1>
        
        <div th:if="${error}" class="alert alert-error">
            <span th:text="${error}"></span>
        </div>
        
        <form th:action="@{/api/profiles/create}" th:object="${profile}" method="post" enctype="multipart/form-data">
            <div class="form-group">
                <label>Full Name *</label>
                <input type="text" th:field="*{fullName}" required>
                <span th:if="${#fields.hasErrors('fullName')}" th:errors="*{fullName}" class="error"></span>
            </div>
            
            <div class="form-group">
                <label>Email *</label>
                <input type="email" th:field="*{email}" required>
                <span th:if="${#fields.hasErrors('email')}" th:errors="*{email}" class="error"></span>
            </div>
            
            <div class="form-group">
                <label>Phone *</label>
                <input type="text" th:field="*{phone}" required>
                <span th:if="${#fields.hasErrors('phone')}" th:errors="*{phone}" class="error"></span>
            </div>
            
            <div class="form-group">
                <label>Profile Type *</label>
                <select th:field="*{profileType}" required>
                    <option th:each="type : ${profileTypes}" th:value="${type}" th:text="${type}"></option>
                </select>
            </div>
            
            <div class="form-group">
                <label>Department</label>
                <input type="text" th:field="*{department}">
            </div>
            
            <div class="form-group">
                <label>Position</label>
                <input type="text" th:field="*{position}">
            </div>
            
            <div class="form-group">
                <label>Address</label>
                <textarea th:field="*{address}"></textarea>
            </div>
            
            <div class="form-group">
                <label>Photo (JPEG/PNG, max 5MB)</label>
                <input type="file" name="photoFile" accept="image/jpeg,image/png">
            </div>
            
            <div class="form-actions">
                <button type="submit">Save Profile</button>
                <a th:href="@{/api/profiles}" class="btn-cancel">Cancel</a>
            </div>
        </form>
    </div>
</body>
</html>
